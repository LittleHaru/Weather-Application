<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Weather app</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <div class="nav-bar">
      <img src="./assets/images/logo.svg" alt="Weather Logo" />
      <div class="dropdown-btn">
        <button class="units-btn">
          <span
            ><img src="./assets/images/icon-units.svg" alt="unit-icon" class="unit-icon"
          /></span>
          Units
          <span
            ><img
              src="./assets/images/icon-dropdown.svg"
              alt="dropdown-icon"
              class="dropdown-icon"
          /></span>
        </button>
        <div class="dropdown-content">
          <button class="unit-change">Switch to Imperial</button>
          <div>Temperature</div>
          <button parameter="temperature" value="celsius">Celcius</button>
          <button parameter="temperature" value="fahrenheit">Fahrenheit</button>
          <div>Wind Speed</div>
          <button parameter="windSpeed" value="km/h">km/h</button>
          <button parameter="windSpeed" value="mph">mph</button>
          <div>Percipitation</div>
          <button parameter="percipitation" value="millimeters">
            Millimeters (mm)
          </button>
          <button parameter="percipitation" value="inches">Inches (in)</button>
        </div>
      </div>
    </div>
    <div class="search-bar">
      <h1>How's The Sky Looking Today?</h1>
      <form onsubmit="" class="search-form">
        <span
          ><img src="./assets/images/icon-search.svg" class="search-icon"
        /></span>
        <input
          type="text"
          placeholder="Search for a place..."
          class="search-input"
          value=""
        />
        <button type="submit" class="search-btn">Search</button>
      </form>
    </div>
    <div class="weather-content">
      <div class="left-side">
        <div class="temperature-container">
          <div class="temperature-img">
            <img src="./assets/images/bg-today-large.svg" alt="weather image">
          </div>
          <div class="temperature-info-container">
            <div class="left-temp">
              <div class="country-info">Berlin, Germany</div>
              <div class="date-info">Tuesday, Aug 5, 2025</div>
            </div>
            <div class="right-temp">
              <img src="./assets/images/icon-sunny.webp" alt="today-icon" class="today-icon">
              <div class="today-temp"></div>
            </div>
          </div>
        </div>
        <div class="weather-info">
          <div class="feels">
            <div class="label">Feels Like</div>
            <div class="info" id="feels-like-info"></div>
          </div>
          <div class="humidity">
            <div class="label">Humidity</div>
            <div class="info" id="humidity-info"></div>
          </div>
          <div class="wind">
            <div class="label">Wind Speed</div>
            <div class="info" id="wind-info"></div>
          </div>
          <div class="percipitation">
            <div class="label">Percipitation</div>
            <div class="info" id="percipitation-info"></div>
          </div>
        </div>
        <div class="daily-title">Daily Forecast</div>
        <div class="daily-forecast"></div>
      </div>
      <div class="right-side">
        <div class="hourly-forecast">
          <div class="hourly-title">
            <p>Hourly Forecast</p>
            <div class="day-dropdown">
              <button class="day-dropdown-btn">
                Day
                <span><img
                    src="./assets/images/icon-dropdown.svg"
                    alt="dropdown-icon"
                    class="dropdown-icon"
                  />
                </span>
              </button>
                <div class="day-dropdown-content">
                  <button value="monday">Monday</button>
                  <button value="tuesday">Tuesday</button>
                  <button value="wednesday">Wednesday</button>
                  <button value="thursday">Thursday</button>
                  <button value="friday">Friday</button>
                  <button value="saturday">Saturday</button>
                  <button value="sunday">Sunday</button>
                </div>
              </div>
            </div>
            <div class="hourly-forecast-content"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </div>
    <script src="./main.js" type='module'></script>
  </body>
</html>
